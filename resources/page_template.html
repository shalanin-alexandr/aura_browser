<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>{{TITLE}}</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    body { min-height: 100vh; background: #050514; color: #e0e0ff; padding: 60px 40px; position: relative; overflow-x: hidden; }
    body::before {
        content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none;
        background: 
            radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,0.6), transparent),
            radial-gradient(1px 1px at 90px 40px, rgba(255,255,255,0.4), transparent),
            radial-gradient(2px 2px at 130px 80px, rgba(255,255,255,0.5), transparent),
            radial-gradient(1px 1px at 200px 50px, rgba(255,255,255,0.5), transparent),
            radial-gradient(1px 1px at 280px 30px, rgba(255,255,255,0.4), transparent),
            radial-gradient(circle at 20% 30%, rgba(120, 70, 200, 0.15) 0%, transparent 40%),
            radial-gradient(circle at 80% 70%, rgba(70, 130, 220, 0.12) 0%, transparent 40%);
        background-size: 350px 200px, 350px 200px, 350px 200px, 350px 200px, 350px 200px, 100% 100%, 100% 100%;
    }
    .container { max-width: 900px; margin: 0 auto; position: relative; z-index: 1; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 50px; animation: fadeInDown 0.6s ease-out; }
    .title-block { display: flex; align-items: center; gap: 20px; }
    .title-icon { font-size: 48px; }
    h1 { font-size: 42px; font-weight: 800; background: linear-gradient(135deg, #a78bfa 0%, #60a5fa 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: 1px; }
    .subtitle { font-size: 14px; color: rgba(224,224,255,0.5); margin-top: 4px; letter-spacing: 2px; }
    .count-badge { background: rgba(167,139,250,0.15); border: 1px solid rgba(167,139,250,0.3); color: #c4b5fd; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; }
    .empty { text-align: center; padding: 80px 20px; color: rgba(224,224,255,0.4); }
    .empty-icon { font-size: 80px; margin-bottom: 20px; opacity: 0.3; }
    .empty-text { font-size: 18px; }
    .items { display: flex; flex-direction: column; gap: 8px; }
    .item { display: flex; align-items: center; gap: 16px; padding: 14px 18px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; transition: all 0.25s ease; cursor: pointer; text-decoration: none; color: #e0e0ff; animation: fadeInUp 0.4s ease-out backwards; }
    .item:hover { background: rgba(167,139,250,0.08); border-color: rgba(167,139,250,0.3); transform: translateX(4px); }
    .item-favicon { width: 32px; height: 32px; min-width: 32px; border-radius: 8px; background: linear-gradient(135deg, rgba(167,139,250,0.3), rgba(96,165,250,0.2)); display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .item-info { flex: 1; min-width: 0; }
    .item-title { font-size: 15px; font-weight: 500; color: #e0e0ff; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-url { font-size: 12px; color: rgba(224,224,255,0.4); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-meta { font-size: 12px; color: rgba(224,224,255,0.5); white-space: nowrap; }
    .item-actions { display: flex; gap: 8px; opacity: 0; transition: opacity 0.2s ease; }
    .item:hover .item-actions { opacity: 1; }
    .action-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: rgba(224,224,255,0.7); padding: 6px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; transition: all 0.2s ease; }
    .action-btn:hover { background: rgba(239,68,68,0.2); border-color: rgba(239,68,68,0.4); color: #fca5a5; }
    .clear-btn { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; padding: 8px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; transition: all 0.2s ease; }
    .clear-btn:hover { background: rgba(239,68,68,0.2); }
    .date-section { margin-top: 30px; margin-bottom: 12px; font-size: 12px; color: rgba(167,139,250,0.7); letter-spacing: 2px; text-transform: uppercase; padding-left: 4px; }
    .date-section:first-child { margin-top: 0; }
    @keyframes fadeInDown { 0% { opacity: 0; transform: translateY(-20px); } 100% { opacity: 1; transform: translateY(0); } }
    @keyframes fadeInUp { 0% { opacity: 0; transform: translateY(15px); } 100% { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title-block">
                <div class="title-icon">{{ICON}}</div>
                <div>
                    <h1>{{HEADING}}</h1>
                    <div class="subtitle">{{SUBTITLE}}</div>
                </div>
            </div>
            <div class="count-badge">{{COUNT}}</div>
        </div>
        {{CONTENT}}
    </div>
</body>
</html>
