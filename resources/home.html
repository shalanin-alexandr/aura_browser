<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AURA Browser</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    
    body {
        min-height: 100vh;
        background: #050514;
        overflow: hidden;
        position: relative;
        color: white;
    }
    
    .stars {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        background: 
            radial-gradient(2px 2px at 20px 30px, white, transparent),
            radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.8), transparent),
            radial-gradient(1px 1px at 50px 160px, white, transparent),
            radial-gradient(1px 1px at 90px 40px, rgba(255,255,255,0.6), transparent),
            radial-gradient(2px 2px at 130px 80px, white, transparent),
            radial-gradient(1px 1px at 160px 120px, rgba(255,255,255,0.7), transparent),
            radial-gradient(1px 1px at 200px 50px, white, transparent),
            radial-gradient(2px 2px at 230px 110px, rgba(255,255,255,0.9), transparent),
            radial-gradient(1px 1px at 280px 30px, white, transparent),
            radial-gradient(1px 1px at 310px 90px, rgba(255,255,255,0.5), transparent);
        background-size: 350px 200px;
        background-repeat: repeat;
        animation: twinkle 4s ease-in-out infinite alternate;
    }
    
    @keyframes twinkle {
        0% { opacity: 0.3; }
        100% { opacity: 1; }
    }
    
    .nebula {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        background: 
            radial-gradient(circle at 20% 30%, rgba(120, 70, 200, 0.3) 0%, transparent 40%),
            radial-gradient(circle at 80% 70%, rgba(70, 130, 220, 0.25) 0%, transparent 40%),
            radial-gradient(circle at 60% 20%, rgba(200, 80, 150, 0.2) 0%, transparent 35%);
        animation: nebula-shift 20s ease-in-out infinite;
    }
    
    @keyframes nebula-shift {
        0%, 100% { transform: scale(1) rotate(0deg); }
        50% { transform: scale(1.1) rotate(10deg); }
    }
    
    .container {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px;
    }
    
    .logo {
        font-size: 96px;
        font-weight: 900;
        letter-spacing: 8px;
        background: linear-gradient(135deg, #a78bfa 0%, #60a5fa 50%, #34d399 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 10px;
        animation: glow 3s ease-in-out infinite alternate, fadeInDown 1s ease-out;
        text-shadow: 0 0 80px rgba(167, 139, 250, 0.5);
    }
    
    @keyframes glow {
        0% { filter: drop-shadow(0 0 20px rgba(167, 139, 250, 0.5)); }
        100% { filter: drop-shadow(0 0 40px rgba(96, 165, 250, 0.8)); }
    }
    
    @keyframes fadeInDown {
        0% { opacity: 0; transform: translateY(-30px); }
        100% { opacity: 1; transform: translateY(0); }
    }
    
    .tagline {
        font-size: 16px;
        color: rgba(255, 255, 255, 0.5);
        letter-spacing: 4px;
        text-transform: uppercase;
        margin-bottom: 60px;
        animation: fadeInUp 1s ease-out 0.3s both;
    }
    
    @keyframes fadeInUp {
        0% { opacity: 0; transform: translateY(30px); }
        100% { opacity: 1; transform: translateY(0); }
    }
    
    .search-box {
        width: 100%;
        max-width: 700px;
        position: relative;
        animation: fadeInUp 1s ease-out 0.5s both;
    }
    
    .search-input {
        width: 100%;
        padding: 22px 30px 22px 65px;
        font-size: 18px;
        color: white;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 50px;
        outline: none;
        transition: all 0.3s ease;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    
    .search-input:focus {
        border-color: rgba(167, 139, 250, 0.6);
        background: rgba(255, 255, 255, 0.08);
        box-shadow: 0 8px 40px rgba(167, 139, 250, 0.3), 0 0 0 3px rgba(167, 139, 250, 0.1);
        transform: translateY(-2px);
    }
    
    .search-input::placeholder {
        color: rgba(255, 255, 255, 0.4);
    }
    
    .search-icon {
        position: absolute;
        left: 25px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 22px;
        opacity: 0.6;
    }
    
    .quick-links {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
        margin-top: 60px;
        max-width: 700px;
        width: 100%;
        animation: fadeInUp 1s ease-out 0.7s both;
    }
    
    .quick-link {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        text-decoration: none;
        color: white;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        cursor: pointer;
    }
    
    .quick-link:hover {
        background: rgba(167, 139, 250, 0.15);
        border-color: rgba(167, 139, 250, 0.4);
        transform: translateY(-5px);
        box-shadow: 0 10px 30px rgba(167, 139, 250, 0.2);
    }
    
    .quick-link-icon {
        font-size: 32px;
        margin-bottom: 8px;
    }
    
    .quick-link-name {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.8);
    }
    
    .planet {
        position: fixed;
        width: 300px;
        height: 300px;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, #6366f1, #1e1b4b);
        bottom: -150px;
        right: -150px;
        box-shadow: 
            inset -30px -30px 60px rgba(0, 0, 0, 0.5),
            0 0 80px rgba(99, 102, 241, 0.4);
        animation: float 6s ease-in-out infinite;
        opacity: 0.5;
    }
    
    .planet-2 {
        position: fixed;
        width: 150px;
        height: 150px;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, #ec4899, #831843);
        top: 80px;
        left: -75px;
        box-shadow: 
            inset -15px -15px 30px rgba(0, 0, 0, 0.5),
            0 0 60px rgba(236, 72, 153, 0.4);
        animation: float 8s ease-in-out infinite reverse;
        opacity: 0.4;
    }
    
    @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-20px); }
    }
    
    .footer {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 12px;
        color: rgba(255, 255, 255, 0.3);
        letter-spacing: 2px;
        z-index: 1;
    }
</style>
</head>
<body>
    <div class="stars"></div>
    <div class="nebula"></div>
    <div class="planet"></div>
    <div class="planet-2"></div>
    
    <div class="container">
        <div class="logo">AURA</div>
        <div class="tagline">Explore the universe of web</div>
        
        <form class="search-box" onsubmit="search(event)">
            <span class="search-icon">⌕</span>
            <input type="text" class="search-input" id="searchInput" placeholder="Поиск в интернете или введите URL..." autofocus>
        </form>
        
        <div class="quick-links">
            <a href="https://www.google.com" class="quick-link">
                <div class="quick-link-icon">🔍</div>
                <div class="quick-link-name">Google</div>
            </a>
            <a href="https://www.youtube.com" class="quick-link">
                <div class="quick-link-icon">▶</div>
                <div class="quick-link-name">YouTube</div>
            </a>
            <a href="https://github.com" class="quick-link">
                <div class="quick-link-icon">⌥</div>
                <div class="quick-link-name">GitHub</div>
            </a>
            <a href="https://www.wikipedia.org" class="quick-link">
                <div class="quick-link-icon">📖</div>
                <div class="quick-link-name">Wikipedia</div>
            </a>
        </div>
    </div>
    
    <div class="footer">AURA BROWSER · v1.0</div>
    
    <script>
        function search(e) {
            e.preventDefault();
            const input = document.getElementById('searchInput').value.trim();
            if (!input) return;
            
            let url;
            if (input.startsWith('http://') || input.startsWith('https://')) {
                url = input;
            } else if (input.includes('.') && !input.includes(' ')) {
                url = 'https://' + input;
            } else {
                url = 'https://www.google.com/search?q=' + encodeURIComponent(input);
            }
            window.location.href = url;
        }
    </script>
</body>
</html>
